services:
  - type: web
    name: prompt-firewall-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: DATABASE_PROVIDER
        value: memory
      - key: VECTOR_PROVIDER
        value: chroma
      - key: CHROMA_HOST
        sync: false
      - key: CHROMA_API_KEY
        sync: false
      - key: CHROMA_TENANT
        sync: false
      - key: CHROMA_DATABASE
        sync: false
      - key: RISK_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_RISK_MODEL
        value: openai/gpt-oss-20b
      - key: GROQ_RAG_MODEL
        value: llama-3.3-70b-versatile
      - key: LANGSMITH_TRACING
        sync: false
      - key: LANGSMITH_ENDPOINT
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
